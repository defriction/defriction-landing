<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" width="100%" height="100%">
  <!-- Transparent background as requested -->
  <g transform="translate(70 25) scale(0.4167)">
    <defs>
      <!-- Premium Green/Teal Gradient matching the brand -->
      <linearGradient id="fin" x1="0.2" y1="0.1" x2="0.8" y2="0.9">
        <stop offset="0" stop-color="#02C39A"/>
        <stop offset="1" stop-color="#00A896"/>
      </linearGradient>
      <!-- Soft drop shadow for depth -->
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
      </filter>
    </defs>
    
    <!-- Main circular background like Telegram logo -->
    <circle cx="120" cy="120" r="120" fill="url(#fin)"/>
    
    <!-- Minimalist white finance icon -->
    <g filter="url(#shadow)">
      <!-- Growth Bars -->
      <rect x="65" y="130" width="24" height="45" rx="6" fill="#ffffff" />
      <rect x="108" y="100" width="24" height="75" rx="6" fill="#ffffff" />
      <rect x="151" y="70" width="24" height="105" rx="6" fill="#ffffff" />
      
      <!-- Trending up arrow -->
      <path d="M 55 105 L 95 65 L 120 90 L 175 35" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 140 35 L 175 35 L 175 70" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>
</svg>