services:
  defriction_web:
    build: .
    container_name: defriction_landing
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"

      # ── Ruta temporal para preview en el subdominio del VPS ──
      - "traefik.http.routers.defriction-preview.rule=Host(`n8n.srv1153123.hstgr.cloud`) && PathPrefix(`/defriction`)"
      - "traefik.http.routers.defriction-preview.entrypoints=websecure"
      - "traefik.http.routers.defriction-preview.tls=true"
      - "traefik.http.routers.defriction-preview.tls.certresolver=mytlschallenge"

      # Middleware: Elimina '/defriction' de la URL antes de enviarla a Nginx
      - "traefik.http.middlewares.defriction-strip.stripprefix.prefixes=/defriction"
      - "traefik.http.routers.defriction-preview.middlewares=defriction-strip"

      # ── Ruta del dominio final (activar cuando los DNS apunten al VPS) ──
      - "traefik.http.routers.defriction-landing.rule=Host(`defriction.org`) || Host(`www.defriction.org`)"
      - "traefik.http.routers.defriction-landing.entrypoints=websecure"
      - "traefik.http.routers.defriction-landing.tls=true"
      - "traefik.http.routers.defriction-landing.tls.certresolver=mytlschallenge"

      # Redirigir www → sin www
      - "traefik.http.middlewares.defriction-www-redirect.redirectregex.regex=^https://www\\.defriction\\.org/(.*)"
      - "traefik.http.middlewares.defriction-www-redirect.redirectregex.replacement=https://defriction.org/$${1}"
      - "traefik.http.middlewares.defriction-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.defriction-landing.middlewares=defriction-www-redirect"

      # Nginx internamente corre en el puerto 80
      - "traefik.http.services.defriction-landing.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
