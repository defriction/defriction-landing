slug: sinnet
order: 1
featured: true
status: live

name:
  en: Sinnet App
  es: Sinnet App

tagline:
  en: The professional way to run your tennis tournaments.
  es: La forma profesional de organizar tus torneos de tenis.

hero:
  headline:
    en: "Your tennis tournament, from registration to champion — all in one place."
    es: "Tu torneo de tenis, de la inscripción al campeón — en un solo lugar."
  subtitle:
    en: "The platform clubs and academies use to take their tournaments to the next level: registrations, payments, court scheduling, live scoring and a public portal where players and fans follow every match. In Spanish, built for Colombia."
    es: "La plataforma con la que clubes y academias llevan sus torneos a otro nivel: inscripciones, pagos, programación de canchas, puntajes en vivo y un portal público para que jugadores y aficionados sigan cada partido. En español y pensada para Colombia."

overview:
  en: "Sinnet App brings everything a tennis tournament involves into one place: from player registration and payment to court scheduling, live scoring and public results. It replaces spreadsheets, WhatsApp groups and hand-drawn brackets with an organized, professional experience that everyone can follow — right from your phone, all tournament long."
  es: "Sinnet App reúne en un solo lugar todo lo que implica organizar un torneo de tenis: desde la inscripción y el pago de los jugadores, hasta la programación de canchas, el marcador en vivo y los resultados públicos. Reemplaza las hojas de cálculo, los grupos de WhatsApp y los cuadros hechos a mano por una experiencia ordenada y profesional que todos pueden seguir — desde tu celular, durante todo el torneo."

audiences:
  - en: "Clubs & academies: organize and run professional tournaments without the usual manual hassle."
    es: "Clubes y academias: organizan y operan torneos profesionales sin el trabajo manual de siempre."
  - en: "Players: register and pay from their phone, then follow everything in their own space — next match, payment status, stats, achievements and match history."
    es: "Jugadores: se inscriben y pagan desde el celular, y siguen todo en su propio espacio — próximo partido, estado de pago, estadísticas, logros e historial de partidos."
  - en: "Fans & families: follow every tournament live, with no account needed."
    es: "Aficionados y familias: siguen cada torneo en vivo, sin necesidad de crear cuenta."

features:
  - icon: app_registration
    title:
      en: "Online registration & payments"
      es: "Inscripción y pagos en línea"
    desc:
      en: "Guided, step-by-step sign-up with payment via Nequi, bank transfer or cash (COP). Every payment is recorded and its receipt linked."
      es: "Inscripción guiada paso a paso, con pago por Nequi, transferencia bancaria o efectivo (COP). Cada pago queda registrado y con su comprobante enlazado."
    image: ../../assets/products/sinnet/04.png
  - icon: confirmation_number
    title: { en: "Your tournament, flyer and all", es: "Tu torneo, con su propio flyer" }
    desc:
      en: "Give each tournament a branded flyer and let players sign up in seconds through a shareable link — with the tournament already selected."
      es: "Dale a cada torneo un flyer con tu marca y deja que los jugadores se inscriban en segundos con un enlace — con el torneo ya seleccionado."
    image: ../../assets/products/sinnet/12.png
  - icon: groups
    title:
      en: "Player database"
      es: "Base de jugadores"
    desc:
      en: "Profiles, stats and a reliability score (no-show history) for every player, so you know who shows up — searchable and always up to date."
      es: "Perfiles, estadísticas y un índice de confiabilidad (historial de inasistencias) de cada jugador, para saber quién cumple — buscable y siempre al día."
    image: ../../assets/products/sinnet/09.png
  - icon: account_circle
    title: { en: "A space for every player", es: "Un espacio para cada jugador" }
    desc:
      en: "Each player gets their own panel: next match, their tournaments, payment status, stats and achievements — all in one place."
      es: "Cada jugador tiene su propio panel: próximo partido, sus torneos, estado de pago, estadísticas y logros — todo en un solo lugar."
    image: ../../assets/products/sinnet/11.png
  - icon: history
    title: { en: "Match history with scores", es: "Historial de partidos con marcadores" }
    desc:
      en: "Every player sees their full match history with set-by-set scores, wins and streaks."
      es: "Cada jugador ve su historial completo con marcadores set por set, victorias y rachas."
    image: ../../assets/products/sinnet/13.png
  - icon: auto_awesome
    title:
      en: "Automatic match generation"
      es: "Generación automática de partidos"
    desc:
      en: "Create your categories and let the system build the full round-robin from your registered players — no manual pairing."
      es: "Crea tus categorías y deja que el sistema arme el round-robin completo a partir de tus inscritos — sin emparejar a mano."
    image: ../../assets/products/sinnet/01.png
  - icon: calendar_view_week
    title:
      en: "Visual court scheduling"
      es: "Programación visual de canchas"
    desc:
      en: "Place matches on each court and time slot by dragging them into place, with conflict detection and one-tap publishing."
      es: "Ubica los partidos en cada cancha y horario arrastrándolos a su lugar, con detección de conflictos y publicación en un toque."
    image: ../../assets/products/sinnet/02.png
  - icon: scoreboard
    title:
      en: "Live scoring"
      es: "Puntajes en vivo"
    desc:
      en: "Capture the score set by set, including tiebreaks, with per-match timers and an \"in play & up next\" board for every court."
      es: "Captura el marcador set por set, con tiebreaks, cronómetros por partido y un tablero de \"en juego y por jugar\" para cada cancha."
    image: ../../assets/products/sinnet/03.png
  - icon: account_tree
    title:
      en: "Group stage & automatic brackets"
      es: "Fase de grupos y cuadros automáticos"
    desc:
      en: "Close the group stage by category, resolve tiebreakers and generate the knockout bracket instantly."
      es: "Cierra la fase de grupos por categoría, resuelve los desempates y genera el cuadro de eliminación al instante."
    image: ../../assets/products/sinnet/08.png
  - icon: public
    title:
      en: "Public results portal"
      es: "Portal público de resultados"
    desc:
      en: "Live, upcoming, group stage, results and bracket — everything players and fans follow with a single link, no account needed. When a tournament ends, the portal shows the champion, runner-up, full bracket, group standings and match history."
      es: "En vivo, próximos, fase de grupos, resultados y cuadro — todo lo que jugadores y aficionados siguen con un solo enlace, sin crear cuenta. Al terminar, el portal muestra campeón, subcampeón, el cuadro completo, las posiciones de los grupos y el historial de partidos."
    image: ../../assets/products/sinnet/10.png

