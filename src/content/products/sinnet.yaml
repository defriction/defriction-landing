# Contact is the only live channel today (no form/Calendly yet).
# liveUrl: needs the production domain (devops) + a seeded permanent demo
# tournament (backend). Pattern, served behind base href /tennis-admin/:
#   https://<prod-domain>/tennis-admin/public-tournament-portal?tenantSlug=<slug>&tournamentId=<id>&tab=live
# A finished tournament does NOT 404 — the portal shows a read-only "Finished" view,
# so a demo link stays valid forever. Set liveUrl once those exist.
ctas:
  demoUrl: "mailto:defriction@defriction.org?subject=Quiero%20unir%20mi%20academia%20a%20Sinnet%20App"
  liveUrl: "#"
  contactUrl: "mailto:defriction@defriction.org?subject=Quiero%20unir%20mi%20academia%20a%20Sinnet%20App"
