differentiators:
  - en: "Everything in one place: from registration to champion, without juggling tools, spreadsheets or chats."
    es: "Todo en un solo lugar: de la inscripción al campeón, sin saltar entre herramientas, hojas de cálculo ni chats."
  - en: "The system handles the tedious part: it builds the groups, computes standings and tiebreakers, and creates the brackets for you."
    es: "El sistema se encarga de lo tedioso: arma los grupos, calcula posiciones y desempates, y crea los cuadros por ti."
  - en: "Live and for everyone: players and fans follow scores, brackets and standings in real time with just a link."
    es: "En vivo y para todos: jugadores y aficionados siguen marcadores, cuadros y posiciones en tiempo real con solo un enlace."
  - en: "A professional image for your academy: clean, public results that make your tournaments look the part."
    es: "Una imagen profesional para tu academia: resultados públicos y prolijos que hacen que tus torneos se vean a la altura."
  - en: "Ready for tournament day: run everything from your phone, courtside, as it happens."
    es: "Listo para el día del torneo: maneja todo desde tu celular, en la cancha, mientras sucede."
  - en: "Made for Colombia: payments with Nequi or cash, everything in Spanish."
    es: "Hecho para Colombia: pagos con Nequi o efectivo, y todo en español."

techNotes: []

honestScope:
  - en: "Payments with Nequi or cash (COP): you record each one and link its receipt, so you keep full control and a clear history."
    es: "Pagos con Nequi o efectivo (COP): registras cada uno y enlazas su comprobante, para que tengas control total y un historial claro."
  - en: "An open public portal anyone can follow without creating an account."
    es: "Un portal público y abierto que cualquiera puede seguir sin crear cuenta."
  - en: "One-tap WhatsApp to coordinate schedules directly with your players."
    es: "WhatsApp en un toque para coordinar horarios directamente con tus jugadores."

