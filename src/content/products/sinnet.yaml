  - en: "An open public portal anyone can follow without creating an account."
    es: "Un portal público y abierto que cualquiera puede seguir sin crear cuenta."
  - en: "One-tap WhatsApp to coordinate schedules directly with your players."
    es: "WhatsApp en un toque para coordinar horarios directamente con tus jugadores."

