slug: sinnet
order: 1
featured: true
status: live

name:
  en: Sinnet App
  es: Sinnet App

tagline:
  en: Tennis tournament management, end to end.
  es: Gestor de torneos de tenis, de punta a punta.

hero:
  headline:
    en: "Your tennis tournament, from registration to champion — all in one place."
    es: "Tu torneo de tenis, de la inscripción al campeón — en un solo lugar."
  subtitle:
    en: "The platform for clubs and academies that automates registrations, payments, court scheduling, live scoring and a public results portal. In Spanish, built for Colombia."
    es: "La plataforma para clubes y academias que automatiza inscripciones, pagos, programación de canchas, puntajes en vivo y un portal público de resultados. En español, pensada para Colombia."

overview:
  en: "A multi-tenant SaaS for tennis clubs and academies to run tournaments from start to finish: online registration and payment, automatic match generation, court scheduling, live scoring and a public results portal. A modern web app (SPA), installable on mobile (PWA), fully in Spanish (Colombia, es-CO)."
  es: "SaaS multi-tenant para que clubes y academias de tenis organicen torneos de principio a fin: inscripción y pago en línea, generación automática de partidos, programación de canchas, puntajes en vivo y un portal público de resultados. App web moderna (SPA), instalable en el móvil (PWA), totalmente en español (Colombia, es-CO)."

audiences:
  - en: "Clubs / academies (admins): organize and run tournaments."
    es: "Clubes / academias (administradores): organizan y operan torneos."
  - en: "Players: register, pay and follow their matches."
    es: "Jugadores: se inscriben, pagan y siguen sus partidos."
  - en: "Spectators / public: follow tournaments live without logging in."
    es: "Espectadores / público: siguen los torneos en vivo sin iniciar sesión."
  - en: "Platform operator (super admin): manages every club from a single place."
    es: "Operador de la plataforma (super admin): gestiona todos los clubes desde un solo lugar."

features:
  - icon: app_registration
    title:
      en: "Online registration & payments"
      es: "Inscripción y pagos en línea"
    desc:
      en: "Step-by-step guided registration, with payment via Nequi or cash (COP). We record payments and link receipts."
      es: "Inscripción guiada por pasos, con pago en Nequi o efectivo (COP). Registramos pagos y enlazamos comprobantes."
  - icon: auto_awesome
    title:
      en: "Automatic match generation"
      es: "Generación automática de partidos"
    desc:
      en: "Create categories and let the system build the full round-robin from your registered players."
      es: "Crea categorías y deja que el sistema arme el round-robin completo a partir de tus inscritos."
  - icon: calendar_view_week
    title:
      en: "Visual court scheduling"
      es: "Programación visual de canchas"
    desc:
      en: "Drag and drop matches onto each court and time slot, with conflict detection and one-click publishing."
      es: "Arrastra y suelta partidos en cada cancha y horario, con detección de conflictos y publicación en un clic."
  - icon: scoreboard
    title:
      en: "Live scoring"
      es: "Puntajes en vivo"
    desc:
      en: "Capture set by set with tiebreaks, per-match timers and an \"In play & queue\" board per court."
      es: "Captura set por set con tiebreaks, cronómetros por partido y un tablero \"En juego y cola\" por cancha."
  - icon: account_tree
    title:
      en: "Group stage & automatic brackets"
      es: "Fase de grupos y cuadros automáticos"
    desc:
      en: "Close the group stage per category, resolve tiebreakers and generate the knockout bracket instantly."
      es: "Cierra la fase de grupos por categoría, resuelve desempates y genera el cuadro de eliminación al instante."
  - icon: public
    title:
      en: "Public portal, no login"
      es: "Portal público sin login"
    desc:
      en: "Live, upcoming, group stage, results and bracket — everything players and the public follow with a link."
      es: "En vivo, próximos, fase de grupos, resultados y bracket — todo lo que jugadores y público siguen con un link."

supportFeatures:
  - en: "Master player database"
    es: "Base maestra de jugadores"
  - en: "Payments dashboard"
    es: "Dashboard de pagos"
  - en: "Public club directory (/clubs)"
    es: "Directorio público de clubes (/clubs)"
  - en: "One-tap WhatsApp contact"
    es: "Contacto por WhatsApp en un toque"

differentiators:
  - en: "End to end, not scattered tools: registration → payment → generation → scheduling → scoring → public results, in one product."
    es: "De punta a punta, no soluciones sueltas: inscripción → pago → generación → programación → puntajes → resultados públicos, en un solo producto."
  - en: "Automates the tedious parts: round-robin, standings/tiebreakers and bracket creation are computed for you."
    es: "Automatiza lo tedioso: round-robin, posiciones/desempates y creación de cuadros se calculan por ti."
  - en: "Real-time, public experience: scores, timers, brackets and tables anyone follows with a link."
    es: "Experiencia en tiempo real y pública: puntajes, cronómetros, cuadros y tablas que cualquiera sigue con un link."
  - en: "Multi-tenant by design: each club's data is isolated; one platform serves many academies."
    es: "Multi-tenant por diseño: los datos de cada club están aislados; una plataforma sirve a muchas academias."
  - en: "Built for mobile: installable PWA, responsive, native to Colombian payments (Nequi/cash, COP)."
    es: "Pensado para el móvil: PWA instalable, responsive, nativo para pagos colombianos (Nequi/efectivo, COP)."
  - en: "Polished, consistent UI: per-category color and a minimalist design language across every view."
    es: "UI pulida y consistente: color por categoría y lenguaje de diseño minimalista en todas las vistas."

techNotes:
  - en: "SPA in Angular (signals, reactive state), installable PWA, es-CO localization across the whole app, REST backend."
    es: "SPA en Angular (signals, estado reactivo), PWA instalable, localización es-CO en toda la app, backend REST."
  - en: "Tournament lifecycle: draft → registrations open → in progress → finished."
    es: "Ciclo de vida del torneo: borrador → inscripciones abiertas → en curso → finalizado."

honestScope:
  - en: "Payments: Nequi and cash (COP). NOT a payment gateway: it records payments and links receipts (it does not process transactions)."
    es: "Pagos: Nequi y efectivo (COP). NO es pasarela de pago: registra pagos y enlaza comprobantes (no procesa transacciones)."
  - en: "Public portal without login."
    es: "Portal público sin login."
  - en: "WhatsApp contact = a click-to-open link, not automated messaging (that's roadmap)."
    es: "Contacto por WhatsApp = enlace para abrir (click-to-open), no mensajería automatizada (eso es roadmap)."
  - en: "Avoids promising automatic SMS/email or payment processing."
    es: "Evita prometer SMS/correo automáticos o procesamiento de pagos."

tags:
  - Angular
  - PWA
  - Multi-tenant
  - es-CO
  - Tenis

